<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512">
  <filter id="paperNoise">
    <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/>
    <feColorMatrix type="matrix" values="0.8 0 0 0 0.1, 0.6 0 0 0 0.1, 0.5 0 0 0 0.1, 0 0 0 0.05 0" />
  </filter>
  <rect width="100%" height="100%" fill="#FDFBF7" />
  <rect width="100%" height="100%" filter="url(#paperNoise)" style="mix-blend-mode: multiply;"/>
</svg>
